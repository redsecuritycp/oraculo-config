name: ARM Watchdog
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Estado real de la VM (OCI) — revivir si está apagada, sin importar el dominio
        id: vmstate
        run: |
          # CLAVE para DR autónomo: si Hetzner tomó el dominio (failover), el health-check del
          # dominio daría 200 (Hetzner) y nunca reviviríamos ARM. Por eso chequeamos el estado
          # REAL de la VM en OCI. Si está STOPPED → START directo. Así ARM revive solo aunque
          # Hetzner esté sirviendo, y después auto-failback.sh (en ARM) recupera el tráfico.
          pip install oci-cli --quiet 2>/dev/null
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=sa-santiago-1
          key_file=~/.oci/oci_api_key.pem
          EOF
          sed -i 's/^          //' ~/.oci/config
          STATE=$(oci compute instance get --instance-id "${{ secrets.ARM_INSTANCE_ID }}" --query 'data."lifecycle-state"' --raw-output 2>/dev/null || echo UNKNOWN)
          echo "VM state: $STATE"
          echo "state=$STATE" >> $GITHUB_OUTPUT
          if [ "$STATE" = "STOPPED" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TG_CHAT }}" -d text="🔋 Watchdog: VM ARM STOPPED → ejecutando START (revival autónomo)." > /dev/null
            oci compute instance action --instance-id "${{ secrets.ARM_INSTANCE_ID }}" --action START 2>&1 || true
            echo "started=yes" >> $GITHUB_OUTPUT
          fi

      - name: Check ARM health (3 intentos, 30s cada uno, 60s entre ellos)
        id: health
        if: steps.vmstate.outputs.started != 'yes'
        run: |
          # 3 checks con 60s de espera entre cada uno, para evitar falsos positivos
          # por blips transitorios (ej: bombardeo SSH causa lentitud momentánea)
          # Total: hasta ~4.5 min de gracia antes de considerar ARM caído
          FINAL_HTTP="200"
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 20 --max-time 30 "https://oraculo.gruposer.com.ar/status" || echo "000")
            echo "Intento $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              FINAL_HTTP="200"
              break
            fi
            FINAL_HTTP="$HTTP"
            if [ "$i" -lt 3 ]; then
              echo "ARM no responde, esperando 60s antes de reintentar..."
              sleep 60
            fi
          done
          echo "http=$FINAL_HTTP" >> $GITHUB_OUTPUT
          echo "HTTP final: $FINAL_HTTP"

      - name: Soft restart via webhook
        id: webhook
        if: steps.vmstate.outputs.started != 'yes' && steps.health.outputs.http != '200'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT }}" \
            -d text="🚨 ARM caído (HTTP ${{ steps.health.outputs.http }}). Intentando webhook restart..." > /dev/null
          curl -s --max-time 10 "https://oraculo.gruposer.com.ar/api/emergency-restart?key=${{ secrets.EMERGENCY_KEY }}" > /dev/null || true
          sleep 120
          FINAL=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "https://oraculo.gruposer.com.ar/status" || echo "000")
          echo "final=$FINAL" >> $GITHUB_OUTPUT
          echo "Post-webhook: $FINAL"

      - name: Hard reboot via OCI API
        if: steps.webhook.outputs.final != '200' && steps.webhook.outputs.final != ''
        run: |
          # Instalar OCI CLI
          pip install oci-cli --quiet 2>/dev/null

          # Configurar credenciales OCI
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=sa-santiago-1
          key_file=~/.oci/oci_api_key.pem
          EOF
          sed -i 's/^          //' ~/.oci/config

          # Detectar estado: si la VM está STOPPED hay que START (no SOFTRESET, que requiere running).
          STATE=$(oci compute instance get --instance-id "${{ secrets.ARM_INSTANCE_ID }}" --query 'data."lifecycle-state"' --raw-output 2>/dev/null || echo UNKNOWN)
          if [ "$STATE" = "STOPPED" ]; then
            ACTION=START
          else
            ACTION=SOFTRESET
          fi

          # Notificar
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT }}" \
            -d text="🔄 Webhook falló. VM estado=$STATE → ejecutando $ACTION via OCI API..." > /dev/null

          # START enciende una VM apagada; SOFTRESET reinicia una colgada-prendida
          oci compute instance action \
            --instance-id "${{ secrets.ARM_INSTANCE_ID }}" \
            --action $ACTION 2>&1 || true

          # Esperar 3 minutos para que ARM bootee
          sleep 180

          AFTER=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "https://oraculo.gruposer.com.ar/status" || echo "000")
          if [ "$AFTER" = "200" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TG_CHAT }}" \
              -d text="✅ ARM se recuperó después del hard reboot OCI" > /dev/null
          else
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TG_CHAT }}" \
              -d text="❌ ARM sigue caído después del hard reboot (HTTP=$AFTER). Revisar OCI Console." > /dev/null
          fi

      - name: Recovered via webhook
        if: steps.webhook.outputs.final == '200'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT }}" \
            -d text="✅ ARM se recuperó con webhook restart" > /dev/null
